# ===================================================================
# BROKEN LINK CHECKER - CONFIGURATION
# ===================================================================

# ----- INPUT (the Excel file containing the list of pages to scan) -----
# Path is relative to the project root unless you give an absolute path.
input.file.path=input/pages_to_check.xlsx
input.sheet.name=Sheet1
# Header text of the column that contains the page URLs (case-insensitive)
input.column.name=URL

# ----- OUTPUT (the generated report) -----
output.file.path=reports/BrokenLinkReport.xlsx

# ----- BROWSER -----
browser=chrome
headless=true
page.load.timeout.seconds=30

# ----- LINK VALIDATION -----
link.connect.timeout.ms=8000
link.read.timeout.ms=8000
# If true, 3xx redirects are reported as BROKEN instead of REDIRECT
treat.redirect.as.broken=false
# If false, only links pointing to the same host as the page being scanned are checked
check.external.links=true

# ----- EXECUTION -----
# Must match the thread-count set in src/test/resources/testng.xml
thread.count=3
